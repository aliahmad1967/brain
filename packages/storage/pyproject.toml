[project]
name = "brain-storage"
version = "0.1.0"
description = "SQLite metadata layer and Qdrant vector store client for Brain"
requires-python = ">=3.13"
dependencies = [
    "brain-core",
    "brain-shared",
    "qdrant-client>=1.12.0,<2",
]

[tool.uv.sources]
brain-core = { workspace = true }
brain-shared = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/brain"]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"
