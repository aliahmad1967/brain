[project]
name = "brain-ai"
version = "0.1.0"
description = "Ollama LLM client, RAG pipeline, and prompt templates for Brain"
requires-python = ">=3.13"
dependencies = [
    "brain-core",
    "brain-shared",
    "httpx>=0.27.0,<1",
]

[tool.uv.sources]
brain-core = { workspace = true }
brain-shared = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/brain"]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"
